services:
  im-main:
    container_name: im-main
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:Z
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:Z
      - ./error_pages:/var/local/error_pages:Z
      - ./www:/usr/share/nginx/html:Z
    networks:
      - im-main-network
    ports:
      - '127.0.0.1:8080:80'
      - '::1:8080:80'
networks:
  im-main-network:
    name: im-main-network
    driver: bridge
